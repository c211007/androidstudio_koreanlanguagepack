  프레임을 삭제(drop)하고 {1}이(가) 호출되기 전 상태로 돌아가 보겠습니다. 스택 프레임 상단 호출 근처에 있는 {2}을(를) 클릭하거나 {3}을(를) 누르세요.
java.debug.workflow.invalid.drop=레슨에서 계획하지 않은 작업을 수행한 것 같습니다. 레슨을 다시 시작해 주세요.
