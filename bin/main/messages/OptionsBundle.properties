configurable.group.tools.settings.display.name=도구
configurable.group.tools.settings.description=<html><body>\
  타사 애플리케이션과의 통합을 구성하고, SSH 터미널 연결 설정을 지정하고, \
  서버 인증서와 작업을 관리하며, 다이어그램 레이아웃 등을 구성합니다.
