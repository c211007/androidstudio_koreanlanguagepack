  IDE 모양 및 동작 사용자 지정\: 테마 및 폰트 크기를 변경하고, 키맵을 미세 조정하고, \
  비밀번호 정책, HTTP 프록시 및 업데이트와 같은 플러그인과 시스템 설정을 구성합니다.
configurable.group.editor.settings.display.name=에디터
configurable.group.editor.settings.description=<html><body>\
  폰트, 강조 표시 스타일, 들여쓰기 등을 변경하여 소스 코드 모양을 개인화합니다. \
  줄 번호, 캐럿 배치, 탭부터 소스 코드 검사, 템플릿 설정, 파일 인코딩에 이르기까지 \
  에디터를 사용자 지정합니다.
