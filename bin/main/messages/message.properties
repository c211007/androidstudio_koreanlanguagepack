parser.parse.1=잘못된 문자입니다.
parser.parse.2=잘못된 참조 번호입니다.
parser.next.1=\\ 뒤에 문자가 필요합니다.
parser.next.2='?'는 예상되지 않습니다. '(?:' 또는 '(?=' 또는 '(?!' 또는 '(?<' 또는 '(?#' 또는 '(?>'?
parser.next.3='(?<=' 또는 '(?<!'가 필요합니다.
parser.next.4=주석이 종료되지 않았습니다.
parser.factor.1=')'가 필요합니다.
parser.factor.2=제어자 그룹에서 패턴이 예기치 않게 종료되었습니다.
parser.factor.3=':'이(가) 필요합니다.
parser.factor.4=조건부 그룹에서 패턴이 예기치 않게 종료되었습니다.
parser.factor.5=조건부 패턴에는 역참조, 앵커, 전방 탐색 또는 후방 탐색이 필요합니다.
parser.factor.6=조건부 그룹에 세 개 이상의 선택 항목이 있습니다.
parser.atom.1=U+0040-U+005f의 문자는 \\c 뒤에 와야 합니다.
parser.atom.2=문자 범주 앞에는 '{'가 필요합니다.
parser.atom.3=속성 이름이 '}'로 닫히지 않았습니다.
parser.atom.4=예기치 않은 메타 문자입니다.
parser.atom.5=알 수 없는 속성입니다.
parser.cc.1=POSIX 문자 클래스는 ':]'로 닫혀야 합니다.
parser.cc.2=문자 클래스에서 패턴이 예기치 않게 종료되었습니다.
parser.cc.3=POSIX 문자 클래스의 알 수 없는 이름입니다.
parser.cc.4=여기서 '-'는 유효하지 않습니다.
parser.cc.5=']'가 필요합니다.
parser.cc.6='['는 문자 클래스에서 유효하지 않습니다. '\\['로 작성하세요.
parser.cc.7=']'는 문자 클래스에서 유효하지 않습니다. '\\]'로 작성하세요.
parser.cc.8='-'는 유효하지 않은 문자 범위입니다. '\\-'로 작성하세요.
parser.ope.1='['가 필요합니다.
parser.ope.2=')' 또는 '-[' 또는 '+[' 또는 '&['가 필요합니다.
parser.ope.3=범위 끝 코드 포인트가 시작 코드 포인트보다 작습니다.
parser.descape.1=유효하지 않은 유니코드 16진수 표기법입니다.
parser.descape.2=16진수 표기법의 오버플로입니다.
parser.descape.3='\\x{'는 '}'로 닫혀야 합니다.
parser.descape.4=유효하지 않은 유니코드 코드 포인트입니다.
parser.descape.5=앵커가 여기에 위치할 수 없습니다.
parser.process.1=이 표현식은 현재 옵션 설정에서 지원되지 않습니다.
parser.quantifier.1=유효하지 않은 수량자입니다. 숫자가 필요합니다.
parser.quantifier.2=유효하지 않은 수량자입니다. 수량이 유효하지 않거나 '}'가 누락되었습니다.
parser.quantifier.3=유효하지 않은 수량자입니다. 숫자 또는 '}'가 필요합니다.
parser.quantifier.4=유효하지 않은 수량자입니다. 최소 수량은 최대 수량보다 작거나 같아야 합니다.
parser.quantifier.5=유효하지 않은 수량자입니다. 수량 값 오버플로입니다.