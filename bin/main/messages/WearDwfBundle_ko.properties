inspection.invalid.color.index.description=<html>\
  색상 구성은 팔레트의 일부로 여러 색상을 가질 수 있습니다. 색상이 여러 개인 경우 구성 참조는 해당 팔레트 내에서 색상의 인덱스를 지정해야 합니다. 예\: [CONFIGURATION.myColor.0]. 팔레트에 색상이 하나만 있는 경우 인덱스는 선택 사항입니다.\
  <br/>\
  자세한 내용은 <a href\="https\://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a> 문서를 참조하세요.\
  </html>
inspection.invalid.color.index.missing.index={0} 범위의 색상 인덱스를 지정해야 합니다.
inspection.invalid.color.index.invalid.index.in.range=색상 인덱스는 {0} 범위의 정수여야 합니다.
inspection.invalid.color.index.invalid.index.optional=색상 인덱스는 선택 사항이며 지정할 경우 0이어야 합니다.
inspection.invalid.color.index.missing.colors=색상 구성은 ColorOption에 하나 이상의 색상을 선언해야 합니다.
inspection.invalid.complication.data.source.location.description=<html>\
  컴플리케이션 데이터 소스는 선언적 시계 모드(Declarative Watch Face) 내의 <code>&lt;Complication&gt;</code> 태그 아래에서만 사용할 수 있습니다.\
  사용 가능한 컴플리케이션 데이터 소스는 컴플리케이션의 유형에 따라 다릅니다. \
  <br/>\
  자세한 내용은 <a href\="https\://developer.android.com/reference/wear-os/wff/user-configuration/color-configuration">ColorConfiguration</a> 문서를 참조하세요.\
  </html>
inspection.invalid.complication.data.source.location.missing.tag=컴플리케이션 데이터 소스는 <Complication> 태그 내에서 사용해야 합니다.
