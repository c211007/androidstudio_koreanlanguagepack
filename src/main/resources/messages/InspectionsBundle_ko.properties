    -profileName         --  프로젝트에 정의된 프로필 이름\n\
    -profilePath         --  프로필 파일의 절대 경로\n\
    -format              --  보고서 출력 형식. xml|json|plain 중 하나, 기본값은 xml입니다.\n\
    -changes             --  커밋되지 않은 변경 사항을 검사하고 새로운 문제를 보고합니다.

