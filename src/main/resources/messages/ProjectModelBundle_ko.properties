global.library.display.name=전역 {0, choice, 1#라이브러리|2#라이브러리}
libraries.node.text.ide=라이브러리에는 애플리케이션에 다양한 기능을 추가하는 클래스가 포함되어 있습니다. \
  또한 프로젝트 개발에 도움이 될 수 있는 소스 파일과 JavaDoc이 포함되어 있습니다.<br><br>\
  IntelliJ IDEA는 코드 완성, 유효성 검사, 오류 강조 표시 등을 지원하기 위해 라이브러리를 사용합니다.<br><br>\
  전역 라이브러리는 전체 프로젝트에서 참조되며 모든 모듈에서 사용할 수 있습니다. \
  또한 컴퓨터에 로컬로 생성된 모든 프로젝트에서 사용할 수 있습니다.<br><br>\
  프로젝트를 공유하는 사용자는 전역 라이브러리를 사용할 수 없습니다. \
  팀과 프로젝트를 공유하는 경우 전역 라이브러리 대신 프로젝트 라이브러리를 사용하세요.<br><br>\
  노드를 확장하고 하위 항목을 선택하여 전역 라이브러리를 관리할 수 있습니다. <br><br>\
   모듈에 라이브러리를 첨부하려면 해당 모듈을 선택하고 종속성 탭을 클릭한 다음 추가를 클릭하여 라이브러리 위치를 지정하세요.
