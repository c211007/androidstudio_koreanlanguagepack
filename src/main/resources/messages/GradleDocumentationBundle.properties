gradle.cmd.option.write.verification.metadata=프로젝트에 사용된 종속성에 대한 체크섬을 생성함 (쉼표로 구분된 목록).
gradle.cmd.option.daemon=Gradle 데몬을 사용하여 빌드를 실행함. 실행 중이 아니면 데몬을 시작함.
gradle.cmd.option.no.daemon=Gradle 데몬을 사용하지 않고 빌드를 실행함. 기본적으로 항상 데몬과 함께 실행하도록 Gradle을 구성한 경우 가끔 유용함.
gradle.cmd.option.status=실행 중이거나 최근에 중지된 Gradle 데몬의 상태를 표시함.
gradle.cmd.option.stop=실행 중인 경우 Gradle 데몬을 중지함.
gradle.cmd.option.foreground=포그라운드에서 Gradle 데몬을 시작함.
