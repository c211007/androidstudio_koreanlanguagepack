sml.studiobot.onboarding.aida.simplified.step3.context.blurb.markdown=프로젝트 컨텍스트를 사용하면 코드베이스와 프로젝트에 더 구체적인 코드를 생성하는 데 도움이 됩니다. 시작할 설정을 확인하세요. **설정 > 도구 > {0}**에서 언제든지 변경할 수 있습니다.
