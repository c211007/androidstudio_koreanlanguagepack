notification.gradle.legacy.firstLoad.info=<div width=400><p>\uc2a4\ud06c\ub9bd\ud2b8 \uad6c\uc131\uc744 \uac00\uc838\uc624\ub824\uba74 Gradle \uad6c\uc131(Configuration) \ub2e8\uacc4\ub97c \uc2e4\ud589\ud574\uc57c \ud569\ub2c8\ub2e4. 
\ud070 Gradle \ud504\ub85c\uc81d\ud2b8\uc758 \uacbd\uc6b0 \ub9ac\uc18c\uc2a4\ub97c \ub9ce\uc774 \uc0ac\uc6a9\ud560 \uc218 \uc788\uc73c\ubbc0\ub85c \uc2a4\ud06c\ub9bd\ud2b8 \uad6c\uc131\uc744 \ubd88\ub7ec\uc624\ub294 \uae30\ub2a5\uc774 \ube44\ud65c\uc131\ud654\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4.</p>
<p>Gradle Kotlin DSL \uc2a4\ud06c\ub9bd\ud2b8\ub97c \ud3c9\uac00\ud558\ub824\uba74 "\uad6c\uc131 \ub85c\ub4dc"\ub97c \ud074\ub9ad\ud558\uc2ed\uc2dc\uc624.</p>
<p>\ub610\ub294, \uc2a4\ud06c\ub9bd\ud2b8\uac00 \ucc98\uc74c \uc5f4\ub9b4 \ub54c \uad6c\uc131\uc744 \uc790\ub3d9\uc73c\ub85c \ubd88\ub7ec\uc624\uace0 \uad6c\uc131 \ube14\ub85d\uc774 \ubcc0\uacbd\ub420 \ub54c\ub9c8\ub2e4 \ub2e4\uc2dc \ub85c\ub4dc\ud558\ub3c4\ub85d \uc124\uc815\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc2a4\ud06c\ub9bd\ud2b8\uc758 "\uc790\ub3d9 \ub2e4\uc2dc \ub85c\ub4dc" \uc635\uc158\uc744 \ucf1c\uc2ed\uc2dc\uc624. 
\uc774\ub7ec\ud55c \uc124\uc815\uc740 \ud504\ub85c\uc81d\ud2b8\uc758 \uad6c\uc131 \uc2dc\uac04\uc774 \uae34 \ub300\uaddc\ubaa8 Gradle \ud504\ub85c\uc81d\ud2b8\uc5d0\ub294 \uad8c\uc7a5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.</p>
</div>
