### CoreModel messages.

### Core model operations
operation.needElements = 작업에는 하나 이상의 요소가 필요합니다.
operation.needName = 작업에는 이름이 필요합니다.
operation.needPath = 작업에는 경로가 필요합니다.
operation.needAbsolutePath = 작업에는 절대 경로가 필요합니다. 지정된 상대 경로\: ''{0}''
operation.needString = 작업에는 문자열이 필요합니다.
operation.notSupported = 지정된 요소 유형에 대해 작업이 지원되지 않습니다\: 
operation.canceled = 작업이 취소되었습니다.
operation.nullContainer = 컨테이너는 null일 수 없습니다.
operation.copyElementProgress = 요소 복사 중...
operation.moveElementProgress = 요소 이동 중...
operation.renameElementProgress = 요소 이름 변경 중...
operation.copyResourceProgress = 리소스 복사 중...
operation.moveResourceProgress = 리소스 이동 중...
operation.renameResourceProgress = 리소스 이름 변경 중...
operation.createFieldProgress = 필드 생성 중...
operation.createMethodProgress = 메서드 생성 중...
operation.deleteElementProgress = 요소 삭제 중...
operation.deleteResourceProgress = 리소스 삭제 중...
operation.pathOutsideProject = 경로 ''{0}''은(는) 프로젝트 {1} 안의 위치를 나타내야 합니다.

### working copy
workingCopy.commit = 작업 사본 커밋 중...

