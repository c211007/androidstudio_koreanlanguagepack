sml.studiobot.onboarding.product.variant.selection.businesses.heading=\ube44\uc988\ub2c8\uc2a4\uc6a9 Gemini
sml.studiobot.onboarding.product.variant.selection.businesses.markdown=\uac1c\uc778\uc6a9 Gemini\uc758 \uae30\ub2a5\uc774 \ud3ec\ud568\ub418\uc5b4 \uc788\uc73c\uba70, \uac10\uc0ac \ub85c\uae45, \ucf54\ub4dc \ud559\uc2b5 \ubc29\uc9c0 \ub4f1 \uc870\uc9c1\uc758 \uac1c\uc778 \uc815\ubcf4 \ubcf4\ud638, \ubcf4\uc548, \uad00\ub9ac \uc694\uad6c\uc0ac\ud56d\uc744 \ucda9\uc871\ud558\ub3c4\ub85d \uc124\uacc4\ub418\uc5c8\uc2b5\ub2c8\ub2e4. [\uc790\uc138\ud788 \uc54c\uc544\ubcf4\uae30](https://d.android.com/r/studio-ui/gemini-for-business)\n\n\ucc38\uace0: \uc544\uc9c1 \ube44\uc988\ub2c8\uc2a4\ub97c \uc704\ud55c Android \uc2a4\ud29c\ub514\uc624\uc758 Gemini\ub97c \uc124\uc815\ud558\uc9c0 \uc54a\uc558\ub2e4\uba74 [\uc5ec\uae30](https://d.android.com/r/studio-ui/gemini-for-business-setup)\uc5d0\uc11c \uc790\uc138\ud788 \uc54c\uc544\ubcf4\uc138\uc694.
