sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb1.markdown=\uc544\ub798\uc5d0 \ud45c\uc2dc\ub41c \uac1c\uc778 \uc815\ubcf4 \ucc98\ub9ac\ubc29\uce68 \ubc0f Google [\uac1c\uc778\uc815\ubcf4\ucc98\ub9ac\ubc29\uce68](https://policies.google.com/privacy)\uc740 Gemini\uac00 \ub370\uc774\ud130\ub97c \ucc98\ub9ac\ud558\ub294 \ubc29\ubc95\uc744 \uc124\uba85\ud569\ub2c8\ub2e4.
sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb2.markdown={0}\uc5d0\uc11c Gemini\ub97c \uc0ac\uc6a9\ud560 \ub54c Google\uc740 \ucc44\ud305 \ud14d\uc2a4\ud2b8, \ud504\ub86c\ud504\ud2b8, \uad00\ub828 \ucf54\ub4dc, \uc0dd\uc131\ub41c \uacb0\uacfc, \uad00\ub828 \uae30\ub2a5 \uc0ac\uc6a9 \uc815\ubcf4 \ubc0f \uc758\uacac\uc744 \uc218\uc9d1\ud569\ub2c8\ub2e4. Google\uc740 \uc774 \ub370\uc774\ud130\ub97c \uc0ac\uc6a9\ud558\uc5ec Google Cloud\uc640 \uac19\uc740 Google \uc5d4\ud130\ud504\ub77c\uc774\uc988 \uc81c\ud488\uc744 \ube44\ub86f\ud55c Google \uc81c\ud488\uacfc \uc11c\ube44\uc2a4, \uae30\uacc4 \ud559\uc2b5 \uae30\uc220\uc744 \uc81c\uacf5, \uac1c\uc120, \uac1c\ubc1c\ud569\ub2c8\ub2e4.\n\n\ud488\uc9c8 \uad00\ub9ac\uc640 \uc81c\ud488 \uac1c\uc120\uc744 \ub3d5\uae30 \uc704\ud574, \uac80\ud1a0 \ub2f4\ub2f9\uc790\uac00 \uadc0\ud558\uc758 \ud504\ub86c\ud504\ud2b8, \uad00\ub828 \ucf54\ub4dc, \uc0dd\uc131\ub41c \uacb0\uacfc, \uad00\ub828 \uae30\ub2a5 \uc0ac\uc6a9 \uc815\ubcf4 \ubc0f \uc758\uacac\uc744 \uc77d\uace0 \ud655\uc778, \ucc98\ub9ac\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uadc0\ud558\uc758 \ub370\uc774\ud130\ub294 Google\uc5d0\uc11c \ucd9c\ucc98\ub97c \uc2dd\ubcc4\ud560 \uc218 \uc5c6\ub294 \uc0c1\ud0dc\ub85c \ucd5c\ub300 18\uac1c\uc6d4 \ub3d9\uc548 \ubcf4\uad00\ub429\ub2c8\ub2e4. Google\uc740 \uc774 \uae30\uac04 \ub3d9\uc548 \uc0ad\uc81c \uc694\uccad\uc744 \uc774\ud589\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.\n\n**\uadc0\ud558 \ub610\ub294 \ud0c0\uc778\uc744 \uc2dd\ubcc4\ud560 \uc218 \uc788\ub294 \ubbfc\uac10\ud55c \uc815\ubcf4(\uc608: \uae30\ubc00 \uc815\ubcf4) \ub610\ub294 \uac1c\uc778 \uc815\ubcf4\ub97c \ud504\ub86c\ud504\ud2b8 \ub610\ub294 \ub2f5\ubcc0\uc5d0 \ud3ec\ud568\ud558\uc9c0 \ub9c8\uc2ed\uc2dc\uc624.**
