debug.selfProfiling.dialog.text=
  IDE가 별도의 프로세스에서 새 ETW 프로파일링 세션을 시작합니다.<br/>
  세션이 시작된 후 실행 중이거나 시작될 디버거 프로세스에 대한 샘플링 정보를 캡처합니다.<br/>
  <br/>
  ETW 세션을 시작하려면 Windows에서 관리자 권한을 요청합니다.<br/>
  <br/>
  완료되면 상태 표시줄의 컨트롤을 사용하여 프로파일링 세션을 중지하세요.<br/>
  Windows 작업 관리자를 통해 ETW 프로세스를 종료하지 마세요:<br/>
  ETW 세션은 응용 프로그램의 수명을 넘어 지속되며 세션을 중지하려면 Windows를 재부팅해야 합니다.
