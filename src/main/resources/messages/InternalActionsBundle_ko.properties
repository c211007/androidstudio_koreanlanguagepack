# These properties are used, see UiInspectorAccessibilityInspection.description
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleActionNotNullInspection.description=AccessibleAction 인터페이스는 "{0}" 역할에 대해 구현되어야 합니다. 이는 화면 판독기 및 음성 제어와 같은 보조 기술이 컴포넌트와 직접 상호작용하지 않고도 작업을 수행할 수 있도록 합니다. 작업의 일반적인 예로는 버튼 클릭, 체크박스 활성화 또는 컨텍스트 메뉴 표시가 있습니다.\n\n해결 방법\:\n컴포넌트의 AccessibleContext가 해당 컴포넌트에 사용할 수 있는 모든 작업과 함께 AccessibleAction 인터페이스를 구현하는지 확인하세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleEditableTextNotNullInspection.description=AccessibleEditableText 인터페이스는 접근 가능한 상태인 "편집 가능" 및 역할 "{0}"을(를) 기반으로 구현되어야 합니다. 이는 화면 판독기 및 음성 제어와 같은 보조 기술이 텍스트 컴포넌트와 상호작용할 수 있도록 합니다.\n\n해결 방법\:\n컴포넌트의 AccessibleContext가 AccessibleEditableText 인터페이스를 구현하는지 확인하세요. 컴포넌트가 편집 가능하지 않아야 하는 경우 AccessibleContext.getAccessibleStateSet() 메서드가 AccessibleState.EDITABLE을 반환하지 않도록 하세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleTextNotNullInspection.description=AccessibleText 인터페이스는 접근 가능한 역할 "{0}"에 대해 구현되어야 합니다. 이는 화면 판독기 및 음성 제어와 같은 보조 기술이 컴포넌트의 텍스트 콘텐츠에 액세스할 수 있도록 합니다.\n\n해결 방법\:\n컴포넌트의 AccessibleContext가 AccessibleText 인터페이스를 구현하는지 확인하세요. 텍스트 컴포넌트가 단순한 정적 텍스트이고 상호작용할 필요가 없다면, 접근 가능한 역할을 "라벨"로 변경하고 접근 가능한 이름으로 텍스트 콘텐츠를 제공하는 것을 고려해 보세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleNameAndDescriptionNotEqualInspection.description=접근 가능한 이름과 설명 속성은 서로 같지 않아야 합니다. 이름은 컴포넌트의 주요 목적을 전달하는 데 사용되며 설명은 지침이나 주석과 같은 추가 정보에 사용될 수 있습니다.\n\n해결 방법\:\n접근 가능한 설명이 접근 가능한 이름과 중복되고 설명에 적합한 추가 정보가 없는 경우 이름만 남겨 두세요. 그렇지 않으면 텍스트를 두 속성으로 적절하게 분할하세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForFocusableComponentsInspection.description="{0}" 역할을 가진 포커스 가능한 컴포넌트의 경우 접근 가능한 이름이 비어 있으면 안 됩니다. 그렇지 않으면 보조 기술 사용자가 상호작용하지 못할 가능성이 높습니다. 예를 들어 화면 판독기 사용자는 이 컴포넌트의 목적을 이해하지 못할 수 있고 음성 제어 사용자는 이름을 사용하여 이 컴포넌트를 활성화할 수 없습니다.\n\n해결 방법\:\n다음과 같은 몇 가지 옵션이 있습니다\:\n1. getAccessibleContext().setAccessibleName() 메서드를 사용하거나 컴포넌트의 AccessibleContext에서 getAccessibleName() 메서드를 재정의하여 컴포넌트의 이름을 설정합니다.\n2. 접근 가능한 이름은 JLabel.setLabelFor(Component) 메서드를 사용하거나 컴포넌트의 도구 설명 또는 텍스트 속성을 설정하여 암시적으로 설정할 수도 있습니다.\n3. 컴포넌트가 순전히 장식용이고 적절한 접근 가능한 이름이 없는 경우, 포커스 가능하지 않게 설정하고 접근 가능한 역할이 올바르게 나타내는지 확인하세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleNameNotEmptyForIcon.description=아이콘에는 해당 아이콘이 나타내는 내용을 설명하는 접근 가능한 이름이 있어야 합니다. 이를 통해 화면 판독기와 같은 보조 기술은 아이콘을 시각적으로 볼 수 없는 사용자에게 아이콘의 의미를 적절하게 전달할 수 있습니다.\n\n해결 방법\:\ngetAccessibleContext().setAccessibleName() 메서드를 사용하여 아이콘에 대한 설명이 포함된 접근 가능한 이름을 설정하세요. 아이콘이 순전히 장식용이고 어떠한 정보도 전달하지 않는 경우 접근 가능한 이름은 비워둘 수 있습니다.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleStateSetContainsFocusableInspection.description=컴포넌트에서 "포커스 가능" 접근성 상태가 누락되었습니다. 접근 가능한 역할 "{0}"을(를) 기반으로 이 컴포넌트는 키보드 포커스가 가능하여 키보드에만 의존해 IDE로 작업하는 사용자가 이 컴포넌트와 상호작용할 수 있어야 합니다.\n\n해결 방법\:\n컴포넌트에서 setFocusable(true)를 호출하여 포커스 가능하도록 하고, Tab/Shift-Tab 탐색을 사용하여 접근할 수 있는지 확인하세요. 컴포넌트가 상호작용하지 않고 포커스가 필요하지 않은 경우, 패널이나 라벨처럼 컴포넌트의 목적을 더 잘 나타내는 비상호작용 역할로 접근 가능한 역할을 변경하는 것을 고려하세요.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.AccessibleValueNotNullInspection.description=AccessibleValue 인터페이스는 접근 가능한 역할 "{0}"에 대해 구현되어야 합니다. 이는 화면 판독기와 같은 보조 기술이 컴포넌트의 값을 판별하고 상호작용할 수 있도록 합니다.\n\n해결 방법\:\n컴포넌트의 AccessibleContext가 AccessibleValue 인터페이스를 구현하는지 확인하세요. 체크박스나 라디오 버튼과 같은 토글 가능한 컴포넌트의 경우 토글이 꺼진 상태에 대해서는 값 0이 반환되어야 하고, 켜진 상태에 대해서는 1이 반환되어야 합니다.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.ImplementsAccessibleInterfaceInspection.description=모든 UI 컴포넌트는 Accessible 인터페이스를 구현하여 화면 판독기 및 음성 제어와 같은 보조 기술에 접근성 메타데이터를 제공해야 합니다.\n\n해결 방법\:\n컴포넌트에 대한 Accessible 인터페이스를 구현하고 컴포넌트의 역할, 상태 및 기타 속성을 설명하는 적절한 AccessibleContext 구현을 제공하세요. 순전히 장식용 컴포넌트(예\: 구분 기호)의 경우 Accessible 인터페이스를 구현하지 않아도 되지만 여전히 권장됩니다.
# suppress inspection "UnusedProperty"
ui.inspector.accessibility.audit.ComponentWithIconHasNonDefaultAccessibleNameInspection.description=아이콘이 있는 컴포넌트의 경우, 아이콘이 순전히 장식용이고 어떠한 정보도 전달하지 않는 경우를 제외하고는 텍스트만 표시하는 대신 아이콘과 텍스트 콘텐츠를 모두 설명하는 접근 가능한 이름이 있어야 합니다.\n\n해결 방법\:\ngetAccessibleContext().setAccessibleName() 메서드를 사용하거나 컴포넌트의 AccessibleContext의 getAccessibleName()을 재정의하여 아이콘과 텍스트를 모두 설명하는 접근 가능한 이름을 설정하세요.

