relaxng.convert-schema.advanced-options.xsd.tooltip.any-process-contents=모든 요소의 processContents 어트리뷰트에 대한 값을 지정합니다. \
입력 형식이 dtd(이 경우 기본값은 DTD 시맨틱에 해당하는 strict)가 아닌 한, 기본값은 skip(RELAX NG 시맨틱에 해당)입니다.
relaxng.convert-schema.advanced-options.xsd.tooltip.disable-abstract-elements=생성된 XML 스키마에서 추상 요소 및 대체 그룹의 사용을 비활성화합니다. \
