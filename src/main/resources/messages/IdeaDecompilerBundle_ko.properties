legal.notice.text=
  <b>중요: JETBRAINS 디컴파일러에 액세스하고 사용함으로써 최종 사용자 라이선스 계약에 명시된 
  특정 약관에 동의하게 됩니다(아래 인용). 이러한 약관에 동의하지 않는 경우 
  JETBRAINS 디컴파일러에 액세스하거나 사용하지 마십시오.</b>
  <br><br>
  이 소프트웨어에는 원본 바이너리 코드에서 소스 코드를 재현할 수 있는 디컴파일 기능 
  (\"JetBrains 디컴파일러\")이 포함되어 있습니다. 라이선스 사용자는 바이너리 코드와 
  소스 코드가 저작권 및 상표법에 의해 보호될 수 있음을 인정합니다. JetBrains 디컴파일러를 
  사용하기 전에 해당 라이선스 계약에 의해 바이너리 코드의 디컴파일이 금지되지 않는지 
  (적용 가능한 법률에 따라 명시적으로 허용되는 경우 제외) 또는 저작권 소유자로부터 
  바이너리 코드를 디컴파일할 권한을 얻었는지 확인해야 합니다.
  <br><br>
  JetBrains 디컴파일러 사용은 전적으로 선택 사항입니다. 라이선스 제공자는 
  JetBrains 디컴파일러의 사용을 권장하거나 용인하지 않으며, 라이선스 사용자가 
  적용 가능한 법률을 위반하여 JetBrains 디컴파일러를 사용하는 것에 대한 책임을 부인합니다.
