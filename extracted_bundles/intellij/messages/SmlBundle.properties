sml.studiobot.onboarding.step1.introBlurb.markdown=Gemini in {0} is an AI coding companion that helps you build high quality apps faster. [Learn more](https://d.android.com/studio/gemini/overview)
sml.studiobot.onboarding.product.variant.selection.secondLine=Confirm your product tier
sml.studiobot.onboarding.product.variant.selection.heading=You're nearly there!
sml.studiobot.onboarding.product.variant.selection.intro.text=To start using Gemini in {0}, select the product you want to use.
sml.studiobot.onboarding.product.variant.selection.individuals.heading=Gemini for individuals
sml.studiobot.onboarding.product.variant.selection.individuals.markdown=Use the power of Gemini at no cost, with a chat interface that is aware of your code, automatic code completions as you write, and generation and transformation of full functions or files on demand. [Learn more](https://d.android.com/studio/gemini/overview)
sml.studiobot.onboarding.product.variant.selection.businesses.heading=Gemini for businesses
sml.studiobot.onboarding.product.variant.selection.businesses.markdown=Includes the features of Gemini for individuals, and designed to meet the privacy, security, and management needs of your business, such as audit logging and no training on your code. [Learn more](https://d.android.com/r/studio-ui/gemini-for-business)\n\nNote: If you haven't already set up Gemini in Android Studio for businesses, learn more [here](https://d.android.com/r/studio-ui/gemini-for-business-setup).
sml.studiobot.onboarding.aida.simplified.step1.welcome.text=Welcome to Gemini
sml.studiobot.onboarding.aida.simplified.step1.bullet1.text=Use Gemini chat to assist in app development
sml.studiobot.onboarding.aida.simplified.step1.bullet2.text=Transform selected code in the editor
sml.studiobot.onboarding.aida.simplified.step1.bullet3.text=Get code improvement suggestions
sml.studiobot.onboarding.aida.simplified.step1.bullet4.text=Generate commit messages
sml.studiobot.onboarding.aida.simplified.step1.signIn.text=Sign in to Google
sml.studiobot.onboarding.aida.simplified.step2.greeting.secondLine=A few words on privacy
sml.studiobot.onboarding.aida.simplified.step2.privacy.title=Gemini and privacy
sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb1.markdown=The Privacy Notice shown below and Google\u2019s [Privacy Policy](https://policies.google.com/privacy) describe how Gemini handles your data.
sml.studiobot.onboarding.aida.simplified.step2.privacy.blurb2.markdown=When you use Gemini in {0}, Google collects chat text, prompts, related code, generated output, related feature usage information, and your feedback. Google uses this data to provide, improve, and develop Google products and services and machine learning technologies, including Google\u2019s enterprise products such as Google Cloud.\n\nTo help with quality and improve our products, human reviewers may read, annotate, and process your prompts, related code, generated output, related feature usage information, and your feedback. Your data will be retained for up to 18 months and stored in a way where Google cannot tell who provided it. Google cannot fulfill deletion requests during this time.\n\n**Do not include sensitive (e.g., confidential) or personal information that can be used to identify you or others in your prompts or feedback.**
sml.studiobot.onboarding.aida.simplified.step3.greeting.secondLine=Get responses tailored for you
sml.studiobot.onboarding.aida.simplified.step3.context.title=Use project context
sml.studiobot.onboarding.aida.simplified.step3.context.blurb.markdown=Using project context will help generate code that is more specific to your codebase and project. Confirm what setting you\u2019d like to start with. These can be changed at any time in **Settings > Tools > {0}**.
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.radiobutton.text=Use all Gemini features (recommended)
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.info.markdown=Allow project context use to get full access to all Gemini features.\n\nYou can also use an .aiexclude file in your project to exclude specific files and directories. [Learn more](https://d.android.com/r/studio-ui/gemini/data-and-privacy/aiexclude)
sml.studiobot.onboarding.aida.simplified.step3.context.allowContext.dontAskAgain.text=Apply to all projects
sml.studiobot.onboarding.aida.simplified.step3.context.noContext.radiobutton.text=Use chat only, without project context
sml.studiobot.onboarding.aida.simplified.step3.context.noContext.info.text=Don't allow project context use and get limited access to Gemini features. Gemini will only use your prompts and past conversation history to respond. Some features, such as AI code completion, will not be available in this mode.
sml.studiobot.onboarding.step1.auth.cta.authorize=Authorize Gemini
sml.studiobot.onboarding.step1.auth.authorized=Authorized!
sml.studiobot.onboarding.step1.disclaimer.markdown=Gemini in {0} is currently available in [select countries](https://d.android.com/r/studio-ui/gemini/availability).
sml.studiobot.onboarding.step3.checkbox.markdown=You must be at least 18 years of age to use Gemini in {0}. Your use of Gemini is subject to the [Google Terms of Service](https://policies.google.com/terms) and the [Generative AI Additional Terms of Service](https://policies.google.com/terms/generative-ai)
