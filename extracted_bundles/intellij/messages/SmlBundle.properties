sml.studiobot.advertiser.description.generateCode=Sign in to Gemini to get code suggestions, compare code diffs, and accept changes directly in the code editor.
sml.studiobot.advertiser.description.documentFunction=Sign in to Gemini to get suggestions for code documentation, review proposed changes, and accept changes directly in the code editor.
sml.studiobot.advertiser.description.explainCode=Sign in to Gemini to get detailed explanations of what the code does and learn how it contributes to your app's appearance or behavior.
sml.studiobot.advertiser.description.suggestImprovements=Sign in to Gemini to get suggestions for how to optimize your app using the latest Android features and how to better organize your code.
sml.studiobot.advertiser.description.rethinkVariables=Sign in to Gemini to get suggestions for variable or method names in a file, and accept the ones you like.
sml.studiobot.advertiser.description.generateUnitTestScenarios=Sign in to Gemini to get suggestions for what to unit test, including detailed test names and descriptions.
sml.studiobot.advertiser.description.suggestCommitMessage=Once you've linked your version control system to the Android Studio IDE, sign in to Gemini to get suggestions for a commit message based on recent code changes and past commits.
sml.studiobot.advertiser.description.buildErrors=Sign in to Gemini to get help troubleshooting unexpected build errors and optimizing your build configuration.
sml.studiobot.advertiser.description.transformCode=Sign in to Gemini and share context to use the transform feature to get code suggestions, optimize your code, or to add code to your app.
sml.studiobot.advertiser.description.promptLibrary=Sign in to Gemini to save and manage your favorite prompts at either the IDE- or project-level.
sml.studiobot.advertiser.description.journeys=Sign in to Gemini to run and record end-to-end tests using natural language prompts.
